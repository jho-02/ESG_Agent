<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경실련 ESG 카테고리 워크벤치</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
      color: #0f172a;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }
    .layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 20px;
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }
    .brand-title { font-size: 18px; font-weight: 700; }
    .brand-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .menu-label {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 10px;
      text-align: center;
    }
    .button, .sub-button, .chip-btn {
      border-radius: 12px;
      cursor: pointer;
      line-height: 1.45;
      word-break: keep-all;
      white-space: normal;
      overflow-wrap: anywhere;
      transition: .15s ease;
    }
    .button {
      background: #0f172a;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-weight: 600;
      text-align: center;
      width: 100%;
    }
    .button:hover { opacity: .95; }
    .sub-button {
      background: #fff;
      color: #334155;
      border: 1px solid #cbd5e1;
      padding: 12px 16px;
      text-align: left;
      width: 100%;
    }
    .sub-button.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }
    .menu-stack, .sector-stack { display: grid; gap: 10px; }
    .text-input, .select, .textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    .textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.6;
    }
    .text-input:focus, .select:focus, .textarea:focus { border-color: #0f172a; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 24px;
      display: none;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
    }
    .header p {
      margin: 8px 0 0;
      color: #64748b;
      line-height: 1.6;
    }
    .content { padding: 24px; }
    .grid-main {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 20px;
      align-items: start;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 20px;
      min-width: 0;
    }
    .search-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .search-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .search-title { font-weight: 700; }
    .search-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr auto;
      gap: 10px;
      align-items: stretch;
    }
    .search-head,
    .search-row {
      display: none;
    }
    .filter-grid {
      grid-template-columns: 1fr;
    }
    .filter-grid .wide,
    .filter-grid .filter-check {
      display: none;
    }
    #sectionFilter,
    #relationFilter {
      display: none;
    }
    .filter-check {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 56px;
      text-align: center;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .kpi {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      text-align: center;
    }
    .kpi-label {
      font-size: 12px;
      color: #64748b;
      line-height: 1.4;
      word-break: keep-all;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      line-height: 1.2;
    }
    .kpi-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.3;
      word-break: keep-all;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .tab-btn { min-width: 110px; }
    .result-list {
      display: grid;
      gap: 14px;
    }
    .result-item {
      width: 100%;
      padding: 16px;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
    }
    .result-item:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }
    .result-flex {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .company-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.35;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .company-meta {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .company-summary {
      font-size: 14px;
      color: #475569;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .score-box {
      min-width: 90px;
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      height: fit-content;
    }
    .score-box small { opacity: .8; display: block; font-size: 12px; }
    .score-box strong { display: block; font-size: 26px; margin-top: 4px; }
    .ranking-wrap {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      min-width: 860px;
    }
    .ranking-header, .ranking-row {
      display: grid;
      grid-template-columns: 72px minmax(90px, 1fr) minmax(120px, 1.3fr) 88px 88px 72px;
      column-gap: 8px;
      align-items: center;
      padding: 14px;
    }
    .ranking-header {
      background: #f8fafc;
      font-weight: 700;
      font-size: 14px;
    }
    .ranking-row {
      background: #fff;
      border: none;
      border-top: 1px solid #e2e8f0;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }
    .ranking-row:hover { background: #f8fafc; }
    .table-scroll {
      max-height: 920px;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
    }
    .table-scroll .ranking-wrap {
      border: none;
      border-radius: 0;
      min-width: 860px;
    }
    .table-scroll .ranking-header {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .page-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .page-info {
      font-size: 13px;
      color: #475569;
      font-weight: 600;
    }
    .pagination-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .page-btn {
      width: auto;
      min-width: 46px;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
    }
    .page-btn[disabled] {
      opacity: .45;
      cursor: default;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: minmax(360px, 0.95fr) minmax(280px, 1.05fr);
      gap: 18px;
      align-items: start;
    }
    .detail-grid.compact {
      grid-template-columns: 1fr;
    }
    .financial-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .mini-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      text-align: center;
    }
    .mini-card .label { font-size: 13px; color: #64748b; line-height: 1.5; }
    .mini-card .value { font-size: 18px; font-weight: 700; margin-top: 10px; line-height: 1.35; word-break: keep-all; }
    .section-title, .card h3, .card h4 {
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.4;
      word-break: keep-all;
    }
    .policy-item {
      padding: 15px 16px;
      border: 1px solid #d8e4f1;
      border-radius: 14px;
      margin-bottom: 10px;
      line-height: 1.7;
      text-align: left;
      word-break: keep-all;
      overflow-wrap: anywhere;
      background: rgba(255, 255, 255, 0.9);
    }
    .policy-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
      color: #0f172a;
    }
    .summary-box {
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .score-bars .row { margin-bottom: 18px; }
    .score-bars .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #0f172a;
    }
    .q-grid { display: grid; gap: 10px; }
    .dark-box {
      padding: 16px;
      border-radius: 16px;
      background: #0f172a;
      color: white;
    }
    .preview-box {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
    }
    .preview-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }
    .preview-score {
      min-width: 96px;
      text-align: center;
      padding: 12px;
      border-radius: 16px;
      background: #0f172a;
      color: #fff;
      align-self: start;
    }
    .field-edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .field-card {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }
    .field-card label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }
    .tone-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tone-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .tone-chip.input { background: #fff2cc; color: #755400; }
    .tone-chip.derived { background: #d9f2d9; color: #166534; }
    .tone-chip.section { background: #d9efff; color: #0c4a6e; }
    .tone-chip.total { background: #fee2e2; color: #991b1b; }
    .tone-chip.link { background: #f3e8ff; color: #6b21a8; }
    .flow-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .flow-box {
      border: 1px solid #d9e2ec;
      border-radius: 20px;
      padding: 18px;
      min-width: 0;
      display: grid;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .flow-box.input {
      background: linear-gradient(180deg, #fffdf3 0%, #fff7d6 100%);
      border-color: #efd38d;
    }
    .flow-box.derived {
      background: linear-gradient(180deg, #f4fff5 0%, #e0f7e2 100%);
      border-color: #9fd6ac;
    }
    .flow-box.section {
      background: linear-gradient(180deg, #f5fbff 0%, #ddeeff 100%);
      border-color: #9dc2eb;
    }
    .flow-box.total {
      background: linear-gradient(180deg, #fff5f5 0%, #ffe0e0 100%);
      border-color: #efaaaa;
    }
    .flow-box .sub-button {
      margin-top: auto;
    }
    .flow-box-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }
    .flow-box-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .flow-box-sub {
      font-size: 13px;
      color: #475569;
      line-height: 1.55;
    }
    .flow-company-banner {
      display: grid;
      gap: 6px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: #fff;
      margin-bottom: 18px;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.16);
    }
    .flow-company-kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      opacity: .82;
    }
    .flow-company-name {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
    }
    .flow-company-meta {
      font-size: 13px;
      line-height: 1.55;
      opacity: .88;
    }
    .helper-note {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }
    .review-tool-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .review-tool {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #dbe4ef;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      text-align: left;
      cursor: pointer;
    }
    .review-tool strong {
      font-size: 16px;
      line-height: 1.35;
      color: #0f172a;
    }
    .review-tool span {
      font-size: 13px;
      line-height: 1.6;
      color: #475569;
      word-break: keep-all;
    }
    .review-tool b {
      font-size: 12px;
      color: #0f172a;
    }
    .review-tool.input {
      background: linear-gradient(180deg, #fffdf3 0%, #fff7d6 100%);
      border-color: #efd38d;
    }
    .review-tool.derived {
      background: linear-gradient(180deg, #f4fff5 0%, #e0f7e2 100%);
      border-color: #9fd6ac;
    }
    .review-tool.section {
      background: linear-gradient(180deg, #f5fbff 0%, #ddeeff 100%);
      border-color: #9dc2eb;
    }
    .review-tool.total {
      background: linear-gradient(180deg, #fff5f5 0%, #ffe0e0 100%);
      border-color: #efaaaa;
    }
    .review-tool.link {
      background: linear-gradient(180deg, #faf5ff 0%, #f3e8ff 100%);
      border-color: #d8b4fe;
    }
    .review-tool.neutral {
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
      border-color: #c7d2fe;
    }
    .company-focus {
      display: grid;
      gap: 16px;
    }
    .company-hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid #d8e4f1;
      background:
        radial-gradient(circle at top right, rgba(14, 116, 144, 0.12), transparent 38%),
        linear-gradient(135deg, #eff6ff 0%, #ffffff 44%, #f8fafc 100%);
    }
    .company-hero-copy {
      flex: 1;
      min-width: 0;
    }
    .company-hero-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: #0f172a;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 12px;
    }
    .company-hero-name {
      display: inline-block;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
      word-break: break-word;
      overflow-wrap: anywhere;
      padding: 10px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      color: #fff;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.16);
    }
    .company-hero .company-meta {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }
    .company-hero .company-summary {
      font-size: 14px;
      color: #334155;
      margin-bottom: 12px;
      max-width: 680px;
    }
    .company-hero .score-box {
      min-width: 126px;
      background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.16);
    }
    .company-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }
    .focus-filter {
      display: grid;
      gap: 8px;
      min-width: 220px;
      font-size: 13px;
      color: #475569;
      font-weight: 700;
    }
    .ghost-controls {
      display: none;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .category-card {
      border: 1px solid #dbe4ef;
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      display: grid;
      gap: 12px;
    }
    .category-card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .category-card-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .category-card-score {
      min-width: 86px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }
    .category-card-score strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-top: 4px;
    }
    .category-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .category-actions .sub-button,
    .category-actions .button {
      width: 100%;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.56);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .modal-panel {
      width: min(920px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      background: #fff;
      border-radius: 24px;
      border: 1px solid #dbe4ef;
      box-shadow: 0 28px 60px rgba(15, 23, 42, 0.18);
      padding: 24px;
    }
    .editor-modal-panel {
      width: min(1240px, 100%);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 18px;
    }
    .modal-close {
      width: auto;
      min-width: 72px;
    }
    .modal-list {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }
    .modal-row {
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: #f8fafc;
    }
    .legend-grid {
      display: grid;
      gap: 10px;
    }
    .legend-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
    }
    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .sidebar {
      width: 320px;
      display: grid;
      gap: 18px;
      align-content: start;
    }
    .sidebar .menu-label {
      text-align: left;
      margin-bottom: 12px;
    }
    .sidebar-search-group {
      display: grid;
      gap: 10px;
    }
    .sidebar-search-row {
      display: flex;
      gap: 10px;
    }
    .sidebar-search-row .button {
      width: auto;
      flex-shrink: 0;
    }
    .sidebar-search-row .text-input {
      flex: 1;
    }
    .sidebar-panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .sidebar-panel-title h3 {
      margin: 0;
    }
    .sidebar-panel-title span {
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
    }
    .sidebar-ranking-list {
      display: grid;
      gap: 10px;
      max-height: 408px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .sidebar-ranking-item {
      width: 100%;
      border: 1px solid #dbe4ef;
      border-radius: 16px;
      background: #fff;
      padding: 11px 12px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      min-width: 0;
    }
    .sidebar-ranking-item:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }
    .sidebar-rank-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: #e2e8f0;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }
    .sidebar-ranking-item.active {
      border-color: #0f172a;
      background: #f8fafc;
    }
    .sidebar-ranking-item.active .sidebar-rank-badge {
      background: #0f172a;
      color: #fff;
    }
    .sidebar-ranking-name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      overflow: hidden;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .sidebar-ranking-score {
      min-width: 34px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: #64748b;
      text-align: right;
      justify-self: end;
      align-self: center;
      font-variant-numeric: tabular-nums;
    }
    .sidebar-ranking-score small {
      display: none;
    }
    .sidebar-ranking-score strong {
      display: block;
      margin-top: 0;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
    }
    .stage-stack,
    .right-stack {
      display: grid;
      gap: 20px;
      align-content: start;
    }
    .grid-main {
      grid-template-columns: minmax(0, 1fr) 320px;
    }
    .tabs,
    #kpiGrid,
    #sectorButtons {
      display: none !important;
    }
    .company-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 20px;
      align-items: start;
    }
    .hero-rank-box {
      display: grid;
      gap: 12px;
    }
    .hero-rank-card {
      border-radius: 20px;
      background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
      color: #fff;
      padding: 18px;
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.18);
    }
    .hero-rank-card .label {
      font-size: 12px;
      opacity: .82;
      margin-bottom: 8px;
    }
    .hero-rank-card .value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }
    .hero-rank-card .sub {
      font-size: 13px;
      line-height: 1.5;
      opacity: .88;
    }
    .hero-note-grid {
      display: grid;
      gap: 10px;
    }
    .hero-note {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid #dbe4ef;
      font-size: 13px;
      color: #334155;
      line-height: 1.5;
    }
    .category-mini-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .category-mini-btn {
      border: 1px solid #dbe4ef;
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      padding: 12px 10px;
      cursor: pointer;
      text-align: left;
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .category-mini-btn:hover {
      border-color: #94a3b8;
      background: #fff;
    }
    .category-mini-btn.active {
      background: #0f172a;
      border-color: #0f172a;
      color: #fff;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.16);
    }
    .category-mini-btn span {
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .category-mini-btn strong {
      font-size: 18px;
      line-height: 1;
    }
    .focus-inline-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .focus-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }
    .category-card.active {
      border-color: #0f172a;
      box-shadow: 0 18px 32px rgba(15, 23, 42, 0.12);
    }
    .hidden { display: none !important; }
    div:has(> #questionGrid) {
      display: none !important;
    }
    @media (max-width: 1200px) {
      .grid-main, .detail-grid, .company-hero { grid-template-columns: 1fr; }
      .category-mini-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; }
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .filter-grid > .wide { grid-column: span 2; }
      .kpi-grid, .financial-grid, .field-edit-grid, .flow-grid, .category-grid, .review-tool-grid, .category-mini-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 640px) {
      .search-row, .result-flex, .preview-head, .company-hero { flex-direction: column; }
      .kpi-grid, .financial-grid, .filter-grid, .field-edit-grid, .flow-grid, .category-grid, .review-tool-grid, .category-mini-grid { grid-template-columns: 1fr; }
      .filter-grid > .wide { grid-column: span 1; }
      .ranking-header, .ranking-row {
        grid-template-columns: 64px 1fr 1.2fr 80px 80px 64px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <div>
          <div class="brand-title">경실련 ESG 워크벤치</div>
          <div class="brand-sub">Agent AI · 카테고리 분석</div>
        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <div class="menu-label">메뉴</div>
        <div class="menu-stack">
          <button class="button">통합 카테고리 분석</button>
          <div style="display:grid; gap:8px;">
            <button class="sub-button">섹션 / 상호작용 탐색</button>
            <input id="manualInput" class="text-input" placeholder="조건 입력 (예: 수도권, 대기업, ESG 보고서)" style="font-size:13px;padding:10px 12px;">
          </div>
        </div>
      </div>

      <div>
        <div class="menu-label">카테고리</div>
        <div id="sectorButtons" class="sector-stack"></div>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <h1>Agent AI ESG 카테고리 분석 대시보드</h1>
        <p>test.html 레이아웃을 기준으로, 업종별 탐색을 카테고리별 흐름으로 바꾸고 색상 단계와 시트 간 상호작용을 함께 확인합니다.</p>
      </div>

      <div class="content">
        <div class="grid-main">
          <div>
            <div class="card">
              <div class="search-head">
                <div class="search-icon">🔎</div>
                <div>
                  <div class="search-title">통합검색</div>
                  <div class="search-sub">기업명, 정책 키워드, ESG 항목, 지역 등을 검색</div>
                </div>
              </div>

              <div class="search-row">
                <input id="keyword" class="text-input" placeholder="예: A기업, 탄소중립, 금융소비자보호, 수도권">
                <button class="button" id="searchBtn" style="width:auto;">검색</button>
              </div>

              <div id="companyFocus" class="company-focus" style="margin-bottom:16px;"></div>
              <div class="helper-note" style="margin-bottom:10px;">기업 그룹 전환</div>
              <div class="filter-grid">
                <select id="profileSelect" class="select" style="height:56px;"></select>
                <select id="sectionFilter" class="select" style="height:56px;"></select>
                <div class="wide">
                  <select id="relationFilter" class="select" style="height:56px;"></select>
                </div>
                <label class="filter-check">
                  <input id="linkOnly" type="checkbox" style="transform:scale(1.1)">
                  정책연계만
                </label>
              </div>
            </div>

            <div id="kpiGrid" class="kpi-grid"></div>

            <div class="tabs">
              <button class="button tab-btn" data-tab="integrated">통합 결과</button>
              <button class="sub-button tab-btn" data-tab="ranking">카테고리 점수</button>
              <button class="sub-button tab-btn" data-tab="detail">세부 흐름</button>
            </div>

            <div id="tab-integrated" class="card"></div>
            <div id="tab-ranking" class="card hidden"></div>
            <div id="tab-detail" class="card hidden"></div>
          </div>

          <div>
            <div class="card" style="margin-bottom:20px;">
              <h3>Agent AI 패널</h3>
              <div style="padding:16px;border-radius:16px;background:#f8fafc;margin-bottom:14px;">
                <div style="font-weight:700;margin-bottom:10px;">추천 질문</div>
                <div id="questionGrid" class="q-grid"></div>
              </div>
              <div class="dark-box">
                <div style="font-weight:700;margin-bottom:10px;">AI 응답 예시</div>
                <div id="aiExample" style="font-size:14px;line-height:1.7;word-break:keep-all;white-space:normal;overflow-wrap:anywhere;"></div>
              </div>
            </div>

            <div class="card" style="margin-bottom:20px;">
              <h3>현재 선택 섹션 미리보기</h3>
              <div class="preview-box">
                <div class="preview-head">
                  <div>
                    <div id="previewName" style="font-size:22px;font-weight:700;line-height:1.35;word-break:keep-all;"></div>
                    <div id="previewMeta" style="color:#64748b;font-size:13px;margin-top:4px;"></div>
                  </div>
                  <div class="preview-score">
                    <div style="font-size:12px;">점수</div>
                    <div id="previewScore" style="font-weight:700;font-size:24px;"></div>
                  </div>
                </div>
                <div id="previewBars" class="score-bars"></div>
              </div>
            </div>

            <div class="card">
              <h3>색상 해석</h3>
              <div id="legendPanel" class="legend-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="categoryModal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <div class="search-title">카테고리 세부 설명</div>
          <div class="search-sub">선택한 기업 기준으로 카테고리 점수와 상위 섹션을 확인합니다.</div>
        </div>
        <button class="sub-button modal-close" type="button" data-close-modal>닫기</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="editorModal" class="modal-overlay hidden">
    <div class="modal-panel editor-modal-panel">
      <div id="editorModalBody"></div>
    </div>
  </div>

  <div id="detailModal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div id="detailModalBody"></div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
