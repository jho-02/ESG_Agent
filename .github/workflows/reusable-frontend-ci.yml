name: Reusable Frontend CI

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        default: '18'

jobs:
  call-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Build
        run: |
          cd frontend
          npm run build --if-present
